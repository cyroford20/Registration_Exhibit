<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register via QR Code - Cyber Spin Wheel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(0, 217, 255, 0.1) 25%, rgba(0, 217, 255, 0.1) 26%, transparent 27%),
                linear-gradient(90deg, transparent 24%, rgba(0, 217, 255, 0.1) 25%, rgba(0, 217, 255, 0.1) 26%, transparent 27%);
            background-size: 50px 50px;
            animation: scroll 20s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scroll {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            width: 100%;
        }

        .qr-card {
            background: rgba(15, 20, 50, 0.9);
            border: 3px solid #00d9ff;
            border-radius: 15px;
            padding: 40px;
            box-shadow:
                0 0 20px rgba(0, 217, 255, 0.5),
                inset 0 0 20px rgba(0, 217, 255, 0.1),
                0 0 40px rgba(255, 0, 110, 0.2);
            text-align: center;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {

            0%,
            100% {
                box-shadow:
                    0 0 20px rgba(0, 217, 255, 0.5),
                    inset 0 0 20px rgba(0, 217, 255, 0.1),
                    0 0 40px rgba(255, 0, 110, 0.2);
            }

            50% {
                box-shadow:
                    0 0 30px rgba(0, 217, 255, 0.8),
                    inset 0 0 30px rgba(0, 217, 255, 0.2),
                    0 0 60px rgba(255, 0, 110, 0.4);
            }
        }

        h1 {
            color: #00d9ff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #00ff88;
            font-size: 0.9em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
        }

        #qrCode {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin: 30px 0;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.4);
        }

        .instructions {
            color: #ffffff;
            font-size: 0.95em;
            line-height: 1.6;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0, 217, 255, 0.1);
            border-left: 3px solid #00ff88;
            border-radius: 5px;
            text-align: left;
        }

        .instructions strong {
            color: #00ff88;
        }

        .instructions-list {
            margin-left: 20px;
            margin-top: 10px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            font-size: 0.95em;
            font-family: 'Space Mono', monospace;
            border: 2px solid;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #00ff88 100%);
            color: #000;
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.8);
        }

        .btn-secondary {
            background: transparent;
            color: #00d9ff;
            border-color: #00d9ff;
        }

        .btn-secondary:hover {
            background: rgba(0, 217, 255, 0.1);
            transform: scale(1.05);
        }

        .btn-download {
            background: linear-gradient(135deg, #ff006e 0%, #ff1493 100%);
            color: #fff;
            border-color: #ff006e;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.8);
        }

        .info-box {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            color: #00ff88;
            font-size: 0.9em;
        }

        .url-display {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00d9ff;
            border-radius: 5px;
            padding: 10px;
            margin: 15px 0;
            color: #00d9ff;
            word-break: break-all;
            font-size: 0.85em;
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 600px) {
            .qr-card {
                padding: 25px;
            }

            h1 {
                font-size: 1.8em;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="qr-card">
            <h1>🎡 CYBER SPIN</h1>
            <p class="subtitle">Manual Registration QR Code</p>

            <div id="qrCode"></div>

            <div class="instructions">
                <strong>📱 How to use:</strong>
                <ul class="instructions-list">
                    <li>Scan this QR code with your mobile device</li>
                    <li>You'll be directed to the registration form</li>
                    <li>Fill in all required fields</li>
                    <li>Register and get ready to spin the wheel!</li>
                </ul>
            </div>

            <div class="info-box">
                ℹ️ <strong>Registration URL:</strong>
                <div class="url-display" id="urlDisplay"></div>
            </div>

            <div class="buttons">
                <a href="#" class="btn btn-primary" onclick="directRegister(); return false;">
                    ➤ Direct Register
                </a>
                <button class="btn btn-download" onclick="exportQRPDF()">
                    📄 Export PDF
                </button>
                <a href="/" class="btn btn-secondary">
                    ← Back to Wheel
                </a>
            </div>
        </div>
    </div>

    <script>
        // Get the current domain/host
        const protocol = window.location.protocol;
        const host = window.location.host;
        const registrationUrl = `${protocol}//${host}/register.html`;

        // Display the URL
        document.getElementById('urlDisplay').textContent = registrationUrl;

        // Generate QR Code
        const qrCode = new QRCode(document.getElementById("qrCode"), {
            text: registrationUrl,
            width: 300,
            height: 300,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Direct registration function
        function directRegister() {
            window.location.href = '/register.html';
        }

        // Export QR as PDF with header and footer
        function exportQRPDF() {
            const canvas = document.querySelector('#qrCode canvas');
            if (canvas) {
                const qrDataUrl = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });

                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();

                // Header
                pdf.setFont('helvetica', 'bold');
                pdf.setFontSize(18);
                pdf.text('CYBER SPIN WHEEL', pageWidth / 2, 18, { align: 'center' });
                pdf.setFontSize(12);
                pdf.setFont('helvetica', 'normal');
                pdf.text('Registration QR Code', pageWidth / 2, 26, { align: 'center' });

                // QR image
                const qrSize = 110;
                const qrX = (pageWidth - qrSize) / 2;
                const qrY = 38;
                pdf.addImage(qrDataUrl, 'PNG', qrX, qrY, qrSize, qrSize);

                // URL text
                pdf.setFontSize(10);
                pdf.text(`URL: ${registrationUrl}`, pageWidth / 2, qrY + qrSize + 12, { align: 'center' });

                // Footer
                pdf.setFontSize(9);
                const exportedAt = new Date().toLocaleString();
                pdf.text(`Generated: ${exportedAt}`, 14, pageHeight - 10);
                pdf.text('Cyber Spin Wheel - IT Exhibit', pageWidth - 14, pageHeight - 10, { align: 'right' });

                pdf.save('cyber-spin-wheel-registration-qr.pdf');
            } else {
                window.alert('QR code is not ready yet. Please try again.');
            }
        }
    </script>
</body>

</html>
