<!doctype html>
<html lang="en">

<head>
  <title>Cyber Spin Wheel Admin - IT Exhibit</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap");
  </style>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="src/admin.css" />
</head>

<body>
  <div class="admin">
    <header class="admin-hero">
      <p class="admin-kicker">⚙️ WHEEL CONFIGURATION</p>
      <h1>WHEEL CONFIGURATION</h1>
      <p class="admin-intro">Tune each wheel sector and save the configuration for the main wheel page.</p>
    </header>

    <section id="sectorPanel" class="wheel-config-section panel-card panel-card-primary">
      <div class="section-heading">
        <h2>🎯 SECTOR CONFIGURATION</h2>
        <p class="section-copy">Adjust sector labels, colors, text color, and weighted probability.</p>
      </div>

      <div class="actions">
        <button id="add" type="button">Add Sector</button>
        <button id="save" type="button">Save</button>
        <a class="link" href="/">Back to wheel</a>
      </div>

      <div id="status" class="status" aria-live="polite"></div>

      <div class="tableWrap">
        <table class="table" aria-label="Wheel sectors">
          <thead>
            <tr>
              <th>Label</th>
              <th>Color</th>
              <th>Text</th>
              <th>Weight</th>
              <th>Probability</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script defer src="src/admin.js"></script>
</body>

</html>
